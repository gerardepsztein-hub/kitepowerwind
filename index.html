<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vent en direct – KitePower</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        background: #000;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #widget {
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: #0bbcd6;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    #wind {
        font-size: 64px;
        font-weight: bold;
        line-height: 1;
    }

    #gust {
        font-size: 22px;
        margin-top: 6px;
    }

    #dir {
        font-size: 20px;
        margin-top: 4px;
    }

    #update {
        font-size: 14px;
        margin-top: 10px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div id="widget">
    <div id="wind">--</div>
    <div id="gust">--</div>
    <div id="dir">--</div>
    <div id="update">Mise à jour...</div>
</div>

<script>
async function loadWind() {
    try {
        const url = "https://www.windguru.cz/int/iapi.php?q=station_data&stid=3321";
        const response = await fetch(url);
        const data = await response.json();

        const w = data.data.wind_avg;
        const g = data.data.wind_max;
        const d = data.data.wind_direction;

        document.getElementById("wind").textContent = Math.round(w);
        document.getElementById("gust").textContent = "Rafales : " + Math.round(g);
        document.getElementById("dir").textContent = "Direction : " + Math.round(d) + "°";

        const now = new Date();
        document.getElementById("update").textContent =
            "MAJ " + now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');

    } catch (e) {
        document.getElementById("wind").textContent = "--";
        document.getElementById("gust").textContent = "Erreur";
        document.getElementById("dir").textContent = "";
    }
}

// première mise à jour
loadWind();

// mise à jour toutes les 60 secondes
setInterval(loadWind, 60000);
</script>

</body>
</html>
