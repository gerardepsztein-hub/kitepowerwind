<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vent en direct</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    #circle {
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: #0bbcd6;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 90px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div id="circle">--</div>

<script>
async function loadWind() {
    try {
        const url = "https://www.windguru.cz/int/iapi.php?q=station_data&stid=3321&format=json";
        const response = await fetch(url);
        const data = await response.json();

        const w = Math.round(data.data.wind_avg);
        document.getElementById("circle").textContent = w;

    } catch (e) {
        document.getElementById("circle").textContent = "--";
    }
}

loadWind();
setInterval(loadWind, 60000);
</script>

</body>
</html>
